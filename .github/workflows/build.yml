name: Build Avisblue Images

on:
  schedule:
    # Build weekly on Sunday at 00:00 UTC
    - cron: "0 0 * * 0"
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Shellcheck build scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          scandir: './build_files'
          severity: warning

      - name: Actionlint workflow files
        uses: reviewdog/action-actionlint@be0761e4c1bab7cfdfca56cd03d4bb6253e39a4a  # v1.72.0
        with:
          fail_level: error
          reporter: github-check

  build:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: avisblue-main
            containerfile: Containerfile.main
            base: ghcr.io/ublue-os/bazzite:stable
          - image: avisblue-nvidia-gaming
            containerfile: Containerfile.nvidia-gaming
            base: ghcr.io/ublue-os/bazzite-nvidia-open:stable
    steps:
      - name: Free disk space
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          echo "After cleanup:"
          df -h /

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Compute build date
        id: date
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: ${{ matrix.containerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          build-args: |
            BASE_IMAGE=${{ matrix.base }}
            BUILD_DATE=${{ steps.date.outputs.date }}
            BUILD_ID=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sign:
    runs-on: ubuntu-latest
    needs: build
    # Always sign (schedule and workflow_dispatch both push)
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign images
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          REGISTRY: ${{ env.IMAGE_REGISTRY }}
          SHA: ${{ github.sha }}
        run: |
          for image in avisblue-main avisblue-nvidia-gaming; do
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "${REGISTRY}/${image}:latest"
            cosign sign --key env://COSIGN_PRIVATE_KEY --yes "${REGISTRY}/${image}:${SHA}"
          done
