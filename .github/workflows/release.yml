name: Release Avisblue ISOs

on:
  workflow_run:
    workflows: ["Build Avisblue Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  RETENTION_DAYS: 30

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
    steps:
      - name: Delete releases older than 30 days
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cutoff=$(date -d "-${RETENTION_DAYS} days" +%s)
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,publishedAt \
            --jq '.[] | select((.publishedAt | fromdateiso8601) < '"$cutoff"') | .tagName' \
          | while read -r tag; do
              echo "Deleting release and tag: $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done

  build-iso:
    needs: cleanup
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - avisblue-main
          - avisblue-nvidia-gaming
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ISO
        uses: jasonn3/build-container-installer@v1.4.0
        with:
          image_name: ${{ matrix.image }}
          image_repo: ${{ env.IMAGE_REGISTRY }}
          image_tag: latest
          version: 43
          variant: Kinoite
          iso_name: ${{ matrix.image }}.iso

      - name: Generate SHA256 checksum
        run: sha256sum ${{ matrix.image }}.iso > ${{ matrix.image }}.iso.sha256sum

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image }}-iso
          path: |
            ${{ matrix.image }}.iso
            ${{ matrix.image }}.iso.sha256sum
          retention-days: 1
          compression-level: 0

  release:
    needs: build-iso
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set release date tag
        id: date
        run: echo "tag=v$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Download all ISO artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.iso' -o -name '*.sha256sum' \) \
            -exec mv {} release-assets/ \;
          echo "Assets to upload:"
          ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.date.outputs.tag }}
        run: |
          # Handle same-day re-runs
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists, deleting..."
            gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Avisblue $TAG" \
            --generate-notes \
            --latest \
            release-assets/*
