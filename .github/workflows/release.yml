name: Release Avisblue ISOs

on:
  workflow_run:
    workflows: ["Build Avisblue Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  PUBLISH_HOST: pool-nas
  PUBLISH_USER: avisblue-ci
  PUBLISH_ROOT: /mnt/POOL/fleet/avisblue
  RETENTION_DAYS: 30

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-iso:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image:
          - avisblue-main
          - avisblue-nvidia-gaming
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build ISO
        uses: jasonn3/build-container-installer@c9ef3de33236e66781ec37bd0485e8009eaefe24  # v1.4.0
        with:
          image_name: ${{ matrix.image }}
          image_repo: ${{ env.IMAGE_REGISTRY }}
          image_tag: latest
          version: 43
          variant: Kinoite
          iso_name: ${{ matrix.image }}.iso

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Checksum + sign ISO
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
          IMAGE: ${{ matrix.image }}
        run: |
          sha256sum "${IMAGE}.iso" > "${IMAGE}.iso.sha256"
          cosign sign-blob \
            --key env://COSIGN_PRIVATE_KEY \
            --use-signing-config=false \
            --output-signature "${IMAGE}.iso.sig" \
            --yes \
            "${IMAGE}.iso"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.image }}-iso
          path: |
            ${{ matrix.image }}.iso
            ${{ matrix.image }}.iso.sha256
            ${{ matrix.image }}.iso.sig
          retention-days: 1
          compression-level: 0

  publish:
    needs: build-iso
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set release date tag
        id: date
        run: echo "tag=v$(date +%Y.%m.%d)" >> "$GITHUB_OUTPUT"

      - name: Download all ISO artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
        with:
          path: artifacts

      - name: Stage release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.iso' -o -name '*.sha256' -o -name '*.sig' \) \
            -exec mv {} release-assets/ \;
          echo "Assets staged:"
          ls -lh release-assets/

      - name: Join tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8  # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Install publish SSH key
        env:
          SSH_KEY: ${{ secrets.PUBLISH_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Verify installed SSH key
        run: |
          ls -la ~/.ssh/id_ed25519
          wc -l ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 | ssh-keygen -lf -

      - name: Publish to pool-nas
        env:
          TAG: ${{ steps.date.outputs.tag }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          REMOTE="${PUBLISH_USER}@${PUBLISH_HOST}"

          # shellcheck disable=SC2086  # SSH_OPTS must word-split
          ssh -v $SSH_OPTS "$REMOTE" "mkdir -p '${PUBLISH_ROOT}/${TAG}'"

          # shellcheck disable=SC2086
          rsync -rtvz --partial \
            --chmod=F644,D755 \
            -e "ssh $SSH_OPTS" \
            release-assets/ \
            "${REMOTE}:${PUBLISH_ROOT}/${TAG}/"

          # shellcheck disable=SC2086
          ssh $SSH_OPTS "$REMOTE" "ln -sfn '${TAG}' '${PUBLISH_ROOT}/latest'"

          echo "=== Published ==="
          # shellcheck disable=SC2086
          ssh $SSH_OPTS "$REMOTE" "ls -lh '${PUBLISH_ROOT}/${TAG}/' && readlink '${PUBLISH_ROOT}/latest'"

      - name: Prune releases older than retention window
        env:
          TAG: ${{ steps.date.outputs.tag }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          REMOTE="${PUBLISH_USER}@${PUBLISH_HOST}"

          # shellcheck disable=SC2086
          ssh $SSH_OPTS "$REMOTE" "
            set -e
            cd '${PUBLISH_ROOT}'
            find . -mindepth 1 -maxdepth 1 -type d -name 'v*' \
              -not -name '${TAG}' \
              -mtime +${RETENTION_DAYS} \
              -print -exec rm -rf {} +
          "
